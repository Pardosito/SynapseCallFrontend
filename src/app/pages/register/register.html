<app-public-header />

<main class="register-page" aria-label="Registro de usuario en SynapseCall">
  <section class="register-shell">
    <header>
      <h1>Crear cuenta</h1>
      <p>Registra tus datos y prepara tu espacio para reuniones colaborativas.</p>
    </header>

    <div class="register-box">
      <app-register-form
        [(name)]="registerName"
        [(email)]="registerEmail"
        [(password)]="registerPassword"
        [(confirmPassword)]="registerPasswordConfirm"
        [isLoading]="isSubmitting()"
        [errorMessage]="errorMessage()"
        (submitRegister)="submitRegister()"
      ></app-register-form>

      <div class="separator">O regístrate con</div>

      <app-google-sign-in-button (googleCredential)="handleGoogleLogin($event)" />
    </div>

    @if (errorMessage()) {
      <p class="register-shell__feedback register-shell__feedback--error">{{ errorMessage() }}</p>
    }

    @if (successMessage()) {
      <p class="register-shell__feedback register-shell__feedback--ok">{{ successMessage() }}</p>
    }
  </section>
</main>

<app-public-footer />
