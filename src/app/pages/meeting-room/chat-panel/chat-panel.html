<div class="chat-container">
  <div class="chat-header">
    <h3>Chat de la reunión</h3>
    <button class="close-btn" (click)="closePanel.emit()">✖</button>
  </div>

  <div class="chat-messages-area" style="flex: 1; overflow-y: auto; padding: 1rem;">
    @for (msg of messages(); track $index) {
      <div
        class="message-bubble"
        [class.my-message]="msg.userName === userName()"
        style="margin-bottom: 10px;"
      >
        <strong style="display: block; font-size: 0.8rem; color: gray;">
          {{ msg.userName }}
        </strong>
        <span>{{ msg.message }}</span>
      </div>
    } @empty {
      <p style="text-align: center; color: gray;">Aún no hay mensajes.</p>
    }
  </div>

  <div class="chat-input-area" style="display: flex; gap: 5px; padding: 1rem;">
    <input
      type="text"
      [(ngModel)]="newMessage"
      (keyup.enter)="send()"
      placeholder="Escribe un mensaje..."
      style="flex: 1;"
    />
    <button class="sc-btn sc-btn-primary" (click)="send()">Enviar</button>
  </div>
</div>
