<div class="chat-panel">

  <div class="panel-header">
    <h3>Chat</h3>
    <button class="close-btn" (click)="closePanel.emit()" title="Cerrar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="messages-list">
    @if (messages().length === 0) {
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Aún no hay mensajes.</p>
      </div>
    }

    @for (msg of messages(); track $index) {
      <div class="message-row" [class.message-row--own]="isOwn(msg)">
        @if (!isOwn(msg)) {
          <div class="sender-name">{{ msg.userName }}</div>
        }
        <div class="bubble" [class.bubble--own]="isOwn(msg)">
          {{ msg.message }}
        </div>
      </div>
    }

    <div #messagesEnd></div>
  </div>

  <div class="input-area">
    <input
      class="message-input"
      type="text"
      [(ngModel)]="newMessage"
      (keyup.enter)="send()"
      placeholder="Escribe un mensaje..."
    />
    <button class="send-btn" (click)="send()" [disabled]="!newMessage.trim()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>
